name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main          # triggers on every push to main
  workflow_dispatch:  # allows manual trigger from Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

# Only allow one deployment at a time
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy Site
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clean Windows metadata artifacts
        run: |
          find . -name "*Zone.Identifier*" -delete
          find . -name "*.Identifier" -delete
          echo "✅ Zone.Identifier files removed"

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload site to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."          # deploy the whole repo root

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
